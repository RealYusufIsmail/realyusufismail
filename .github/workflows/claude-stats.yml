name: Update Claude Stats

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  workflow_dispatch:        # Allow manual runs

jobs:
  update-stats:
    runs-on: ubuntu-latest
    if: ${{ secrets.ANTHROPIC_ADMIN_API_KEY != '' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Claude stats SVG
        env:
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
        run: node scripts/generate-claude-stats.js

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/claude-stats.svg
          git diff --staged --quiet || git commit -m "chore: update Claude Code usage stats"
          git push
